name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci
      - run: npm run build

      - name: Run tests
        env:
          DATABASE_URL: file:./test.db
          JWT_SECRET: test-secret-key-at-least-32-chars-long!
          NODE_ENV: test
        run: npm test

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        if: always()

  docker:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: robomonitor
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d robomonitor"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t robomonitor-ts:${{ github.sha }} .

      - name: Smoke test container
        run: |
          docker run -d --name smoke --network host \
            -e NODE_ENV=production \
            -e JWT_SECRET=test_jwt_secret_for_ci_only \
            -e DATABASE_URL="postgresql://postgres:postgres@localhost:5432/robomonitor?schema=public" \
            robomonitor-ts:${{ github.sha }}

          echo "Waiting for API to start..."
          for i in {1..30}; do
            if curl -fsS http://localhost:3000/health; then
              echo "API is healthy"
              exit 0
            fi
            echo "Attempt $i failed, waiting..."
            docker logs smoke || true
            sleep 2
          done

          echo "API did not become healthy in time"
          docker logs smoke
          exit 1
          